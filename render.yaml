services:
  - type: web
    name: omniquant-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: QUANT_CACHE_DIR
        value: /tmp/quant_cache
      - key: TUSHARE_TOKEN
        sync: false
      - key: OMNIQUANT_ADMIN_TOKEN
        sync: false
